<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KitZone — Maillots de Football</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #FF3B30;
    --accent2: #007AFF;
    --dark: #0A0A0A;
    --light: #F5F5F7;
    --white: #FFFFFF;
    --gray: #8A8A8E;
    --border: #E5E5EA;
    --card-bg: #FFFFFF;
    --font-title: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --nav-h: 64px;
    --radius: 14px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: var(--font-body); background: var(--light); color: var(--dark); min-height: 100vh; }
  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    height: var(--nav-h); background: rgba(255,255,255,0.92);
    backdrop-filter: blur(16px); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; gap: 0;
  }
  .nav-logo {
    font-family: var(--font-title); font-size: 26px; font-weight: 900;
    letter-spacing: -0.5px; color: var(--dark); text-decoration: none;
    flex-shrink: 0; cursor: pointer;
  }
  .nav-logo span { color: var(--accent); }
  .nav-links {
    display: flex; align-items: center; gap: 2px; margin: 0 auto; flex-wrap: nowrap;
  }
  .nav-link {
    font-family: var(--font-body); font-size: 13px; font-weight: 500;
    color: var(--dark); text-decoration: none; padding: 6px 10px;
    border-radius: 8px; transition: background 0.15s, color 0.15s;
    white-space: nowrap; cursor: pointer; border: none; background: none;
  }
  .nav-link:hover, .nav-link.active { background: var(--light); color: var(--accent); }
  /* NAV DROPDOWN */
  .nav-dropdown { position: relative; }
  .nav-dropdown-menu {
    display: none; position: absolute; top: calc(100% + 8px); left: 50%;
    transform: translateX(-50%); background: #fff; border: 1.5px solid var(--border);
    border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    min-width: 180px; overflow: hidden; z-index: 1100;
  }
  .nav-dropdown:hover .nav-dropdown-menu,
  .nav-dropdown-menu:hover { display: block; }
  .nav-dropdown-item {
    display: block; width: 100%; padding: 10px 16px; font-size: 13px;
    font-family: var(--font-body); font-weight: 500; color: var(--dark);
    background: none; border: none; cursor: pointer; text-align: left;
    transition: background 0.15s;
  }
  .nav-dropdown-item:hover { background: var(--light); color: var(--accent); }
  .nav-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--light); border-radius: 24px; padding: 6px 14px;
    flex-shrink: 0; width: 200px; border: 1.5px solid transparent;
    transition: border-color 0.2s;
  }
  .nav-search:focus-within { border-color: var(--accent2); }
  .nav-search svg { width: 15px; height: 15px; color: var(--gray); flex-shrink: 0; }
  .nav-search input {
    border: none; background: none; outline: none; font-size: 13px;
    font-family: var(--font-body); width: 100%; color: var(--dark);
  }
  .nav-search input::placeholder { color: var(--gray); }
  /* PAGES */
  .page { display: none; padding-top: calc(var(--nav-h) + 24px); min-height: 100vh; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 24px; }
  .section-title {
    font-family: var(--font-title); font-size: 42px; font-weight: 900;
    letter-spacing: -0.5px; line-height: 1.05; margin-bottom: 8px;
  }
  .section-sub { font-size: 15px; color: var(--gray); margin-bottom: 32px; }
  /* HERO */
  .hero {
    background: linear-gradient(135deg, #0A0A0A 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 520px; display: flex; align-items: center;
    padding: calc(var(--nav-h) + 60px) 0 60px; position: relative; overflow: hidden;
  }
  .hero::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 70% 50%, rgba(255,59,48,0.18) 0%, transparent 65%),
                radial-gradient(ellipse at 20% 80%, rgba(0,122,255,0.15) 0%, transparent 55%);
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: rgba(255,59,48,0.15); border: 1px solid rgba(255,59,48,0.3);
    color: #FF6B6B; font-size: 12px; font-weight: 600; letter-spacing: 1px;
    text-transform: uppercase; padding: 5px 14px; border-radius: 20px; margin-bottom: 24px;
  }
  .hero-title {
    font-family: var(--font-title); font-size: 72px; font-weight: 900;
    color: #fff; letter-spacing: -1px; line-height: 0.95; margin-bottom: 20px;
  }
  .hero-title span { color: var(--accent); }
  .hero-sub { font-size: 17px; color: rgba(255,255,255,0.6); max-width: 480px; line-height: 1.6; margin-bottom: 36px; }
  .hero-ctas { display: flex; gap: 12px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--accent); color: #fff; border: none; padding: 13px 28px;
    border-radius: 10px; font-size: 15px; font-weight: 600; font-family: var(--font-body);
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,59,48,0.35); }
  .btn-secondary {
    background: rgba(255,255,255,0.1); color: #fff; border: 1.5px solid rgba(255,255,255,0.25);
    padding: 13px 28px; border-radius: 10px; font-size: 15px; font-weight: 600;
    font-family: var(--font-body); cursor: pointer; transition: background 0.15s;
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.15); }
  .hero-stats {
    display: flex; gap: 40px; margin-top: 48px; padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.12);
  }
  .hero-stat-num {
    font-family: var(--font-title); font-size: 36px; font-weight: 900; color: #fff;
  }
  .hero-stat-label { font-size: 13px; color: rgba(255,255,255,0.5); }
  /* PRODUCT GRID */
  .products-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px; margin-bottom: 48px;
  }
  .product-card {
    background: var(--card-bg); border-radius: var(--radius); overflow: hidden;
    box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer; border: 1.5px solid transparent;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 40px rgba(0,0,0,0.13); border-color: var(--border); }
  .product-img {
    width: 100%; aspect-ratio: 1/1; background: #f0f0f5;
    display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
  }
  .product-img img { width: 100%; height: 100%; object-fit: cover; }
  .product-img-placeholder {
    width: 100%; height: 100%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px; color: var(--gray);
  }
  .product-img-placeholder svg { width: 48px; height: 48px; opacity: 0.3; }
  .product-badge {
    position: absolute; top: 10px; left: 10px;
    background: var(--accent); color: #fff; font-size: 11px; font-weight: 700;
    padding: 3px 9px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  /* Badge spécial enfant */
  .product-badge.enfant { background: #FF9500; }
  .product-info { padding: 14px; }
  .product-vendor { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 4px; }
  .product-title { font-size: 14px; font-weight: 600; color: var(--dark); margin-bottom: 10px; line-height: 1.35; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; }
  .product-price { font-family: var(--font-title); font-size: 20px; font-weight: 700; color: var(--dark); }
  .product-btn {
    background: var(--dark); color: #fff; border: none; width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 18px; transition: background 0.15s;
  }
  .product-btn:hover { background: var(--accent); }
  /* LEAGUES SECTION */
  .leagues-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 48px; }
  .league-card {
    background: #fff; border-radius: var(--radius); padding: 24px 16px;
    text-align: center; cursor: pointer; border: 1.5px solid var(--border);
    transition: all 0.2s; box-shadow: var(--shadow);
  }
  .league-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .league-emoji { font-size: 42px; margin-bottom: 10px; display: block; }
  .league-name { font-family: var(--font-title); font-size: 17px; font-weight: 700; }
  .league-count { font-size: 12px; color: var(--gray); margin-top: 4px; }
  /* FEATURED */
  .featured-section { background: #fff; border-radius: 20px; padding: 40px; margin-bottom: 40px; box-shadow: var(--shadow); }
  .featured-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
  .see-all { font-size: 14px; color: var(--accent2); font-weight: 500; cursor: pointer; text-decoration: none; border: none; background: none; font-family: var(--font-body); }
  /* LOADING */
  .loading-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
  .skeleton {
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 200% 100%; animation: shimmer 1.5s infinite;
    border-radius: var(--radius);
  }
  @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
  .skeleton-card { border-radius: var(--radius); overflow: hidden; }
  .skeleton-img { height: 220px; }
  .skeleton-text { height: 14px; margin: 14px 14px 6px; border-radius: 6px; }
  .skeleton-text.short { width: 60%; }
  /* EMPTY STATE */
  .empty-state { text-align: center; padding: 80px 24px; }
  .empty-state svg { width: 64px; height: 64px; color: var(--border); margin-bottom: 16px; }
  .empty-state h3
